name: pinjam_in
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
    sdk: ^3.8.1

dependencies:
    flutter:
        sdk: flutter
    flutter_svg: ^2.0.7
    google_fonts: ^5.0.0
    flutter_contacts: ^1.1.9+2
    url_launcher: ^6.1.14
    # bump to modern versions so Android v1 embedding errors are avoided
    file_picker: ^10.3.3
    image_picker: ^1.2.0
    image: ^4.5.4
    path_provider: ^2.0.13
    shared_preferences: ^2.1.1
    firebase_core: ^4.2.0
    cloud_firestore: ^6.0.3
    firebase_storage: ^13.0.3
    firebase_auth: ^6.1.1
    path: ^1.9.1

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^5.0.0

flutter:
    uses-material-design: true
    assets:
        - assets/images/
